name: elara_player
description: A cross-platform, production-grade Flutter audio/video player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core video player - supports Android, iOS, Web, macOS, Windows, Linux
  video_player: ^2.7.2
  # Windows implementation for video_player
  # video_player_win: ^2.3.11

  media_kit: ^1.1.10
  media_kit_video: ^1.1.10
  media_kit_native_event_loop: ^1.0.5
  media_kit_libs_video: ^1.0.5
  
  # Audio player for audio-only files - supports all platforms
  audioplayers: ^5.1.0
  
  # State management
  flutter_riverpod: ^2.4.0
  
  # Screen orientation and fullscreen support
  native_device_orientation: ^1.1.4
  wakelock_plus: ^1.1.3
  
  # Platform detection
  universal_platform: ^1.0.0+1
  
  # UI components
  flutter_screenutil: ^5.9.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Utils
  path_provider: ^2.1.0
  http: ^1.1.0
  
  # Volume and brightness control (mobile)
  volume_controller: ^2.0.7
  screen_brightness: ^0.2.1
  
  # Shared preferences for settings
  shared_preferences: ^2.2.1
  
  # URL launcher for external links
  url_launcher: ^6.1.14
  
  # Window management for custom title bar
  window_manager: ^0.3.8
  
  # File picker for local file selection
  file_picker: ^6.1.1
  
  # Path manipulation
  path: ^1.8.3
  
  # Audio metadata extraction
  audiotags: ^1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
